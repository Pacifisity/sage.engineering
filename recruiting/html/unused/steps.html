<section id="steps">
  <div class="container">
    <h2 class="section-title">Steps to Join</h2>
    <div class="grid">
      <div class="card step">
        <div class="num">1</div>
        <div>
          <strong>Intro Call</strong>
          <p class="muted">[Short description of your first step.]</p>
        </div>
      </div>
      <div class="card step">
        <div class="num">2</div>
        <div>
          <strong>Eligibility & Goals</strong>
          <p class="muted">[Explain how you help them prepare.]</p>
        </div>
      </div>
      <div class="card step">
        <div class="num">3</div>
        <div>
          <strong>Connect with Recruiter</strong>
          <p class="muted">[Explain referral credit and next steps.]</p>
        </div>
      </div>
    </div>
    <div class="cta-row">
      <a
        class="btn btn-primary"
        href="[YOUR_REFERRAL_LINK]"
        target="_blank"
        rel="noopener noreferrer"
        >Start Your Referral</a
      >
      <a class="btn btn-secondary js-ask-question" href="#contact"
        >Ask a Question</a
      >
    </div>
  </div>
</section>
