<section id="contact">
  <div class="container grid grid-2">
    <div>
      <h2 class="section-title">Contact Me</h2>
      <p class="muted">
        I will respond to your email as soon as I can, 
        typically within a day, if I don't respond within 3 days please feel free to reach out directly to: skyler.r.sage.mil@army.mil
      </p>
    </div>
    <div class="card contact-card" id="contact-card">
      <form id="contact-form" data-endpoint="https://formsubmit.co/bfdc722b77cb4ce59b81326e79e5031f">
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="tel" name="phone" placeholder="Phone (optional)" />
        <textarea name="message" placeholder="What questions do you have?"></textarea>
        <button class="btn btn-primary" type="submit">Send Message</button>
        <div id="form-message" class="form-message"></div>
      </form>
    </div>
  </div>
</section>
